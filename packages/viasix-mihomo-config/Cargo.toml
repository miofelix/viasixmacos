[package]
name = "viasix-mihomo-config"
version = "0.1.1"
edition = "2021"
description = "ViaSix Mihomo config projection (shared, contracts-aligned)"
license = "MIT"
publish = false

[dependencies]
serde_yaml = "0.9"
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lib]
name = "viasix_mihomo_config"
path = "src/lib.rs"
