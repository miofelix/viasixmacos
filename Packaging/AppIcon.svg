<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#171815" flood-opacity="0.14"/>
    </filter>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#171815" flood-opacity="0.10"/>
    </filter>
    <clipPath id="appShape">
      <rect x="64" y="64" width="896" height="896" rx="216"/>
    </clipPath>
  </defs>

  <!-- Pure white tile; the route and address mark carry all of the meaning. -->
  <rect
    x="64"
    y="64"
    width="896"
    height="896"
    rx="216"
    fill="#FFFFFF"
    filter="url(#tileShadow)"
  />

  <g clip-path="url(#appShape)">
    <rect
      x="65"
      y="65"
      width="894"
      height="894"
      rx="215"
      fill="none"
      stroke="#F1F1EE"
      stroke-width="2"
    />

    <!-- One quiet diagonal route adds direction without becoming decoration. -->
    <path
      d="M174 720C300 720 320 650 398 650C458 650 454 510 512 510C570 510 598 370 846 300"
      fill="none"
      stroke="#A1A39D"
      stroke-width="16"
      stroke-linecap="round"
    />

    <circle cx="174" cy="720" r="18" fill="#242522"/>
    <path
      d="M820 278L852 300L820 322"
      fill="none"
      stroke="#242522"
      stroke-width="16"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- The address container and compressed IPv6 marker sit above the route. -->
    <g
      fill="none"
      stroke="#242522"
      stroke-width="42"
      stroke-linecap="round"
      stroke-linejoin="round"
      filter="url(#markShadow)"
    >
      <path d="M372 326H316C280 326 254 352 254 388V636C254 672 280 698 316 698H372"/>
      <path d="M652 326H708C744 326 770 352 770 388V636C770 672 744 698 708 698H652"/>
    </g>

    <!-- Four dots: the compressed IPv6 double colon. -->
    <g fill="#242522" filter="url(#markShadow)">
      <circle cx="476" cy="438" r="24"/>
      <circle cx="548" cy="438" r="24"/>
      <circle cx="476" cy="586" r="24"/>
      <circle cx="548" cy="586" r="24"/>
    </g>
  </g>
</svg>
