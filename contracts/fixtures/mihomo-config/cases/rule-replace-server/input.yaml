proxies:
  - name: My VLESS
    type: vless
    server: origin.example.com
    port: 443
    uuid: 11111111-1111-4111-1111-111111111111
    network: ws
    tls: true
    servername: origin.example.com
    ws-opts:
      path: /proxy
      headers:
        Host: origin.example.com
  - name: unused-edge
    type: ss
    server: unused.example.com
    port: 8388
    cipher: aes-128-gcm
    password: secret
proxy-providers:
  remote:
    type: http
    url: https://subscription.example/profile.yaml
    path: remote.yaml
proxy-groups:
  - name: PROXY
    type: select
    proxies: [My VLESS, unused-edge]
rules:
  - DOMAIN-SUFFIX,example.com,DIRECT
  - MATCH,PROXY
x-viasix:
  version: 1
  primary-server: selected-ip
