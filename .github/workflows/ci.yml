name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  contracts:
    name: Contracts layout
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify contracts and platform skeletons
        run: |
          make contracts-check
          make windows-skeleton
          make android-skeleton
          make windows-build-docs

  windows-projection:
    name: Windows + shared projection contracts (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/windows/src-tauri
            packages/viasix-mihomo-config

      - name: Install Linux WebKit deps for tauri-build
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Run shared + Windows projection contract tests
        run: |
          make shared-test
          make windows-test

  android-projection:
    name: Android projection contracts (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run :core contract tests
        run: make android-test

  macos:
    name: macOS build, test, package (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Run quality checks
        run: make macos-check

      - name: Verify application packaging
        env:
          VIASIX_EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: make macos-app
