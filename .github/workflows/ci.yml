name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test-package:
    name: Build, test, and package (${{ matrix.architecture }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
          - runner: macos-15-intel
            architecture: x86_64

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          uname -m
          swift --version
          xcodebuild -version

      - name: Run quality checks
        run: make check

      - name: Verify application packaging
        env:
          VIASIX_EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
        run: make app
