name: Windows Build

on:
  push:
    paths:
      - "apps/windows/**"
      - "contracts/**"
      - ".github/workflows/windows-build.yml"
  pull_request:
    paths:
      - "apps/windows/**"
      - "contracts/**"
      - ".github/workflows/windows-build.yml"
  workflow_dispatch:

concurrency:
  group: windows-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build NSIS (${{ matrix.target }})
    runs-on: windows-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/src-tauri
          key: windows-${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack / pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.0 --activate

      - name: Install frontend dependencies
        working-directory: apps/windows
        run: pnpm install --frozen-lockfile=false

      - name: Download mihomo and CFST sidecars
        working-directory: apps/windows
        run: |
          node scripts/fetch-mihomo.mjs ${{ matrix.target }}
          node scripts/fetch-cfst.mjs ${{ matrix.target }}
          Get-ChildItem src-tauri/sidecar | Format-Table Name, Length

      - name: Run projection contract tests
        working-directory: apps/windows/src-tauri
        run: cargo test --target ${{ matrix.target }}

      - name: Build Tauri app (NSIS)
        working-directory: apps/windows
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          # Reduce OOM risk on CI runners
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: viasix-windows-${{ matrix.arch }}-nsis
          path: |
            apps/windows/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload portable exe (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: viasix-windows-${{ matrix.arch }}-exe
          path: |
            apps/windows/src-tauri/target/${{ matrix.target }}/release/ViaSix.exe
            apps/windows/src-tauri/target/release/ViaSix.exe
          if-no-files-found: warn
          retention-days: 14
